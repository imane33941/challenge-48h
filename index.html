<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <link rel="stylesheet" href="login.css?v=20260330-14">
</head>

<body>

<div class="container">
  <div class="box">

    <h2 id="title">Connexion</h2>

    <form id="form">

      <input type="text" placeholder="Pseudo" id="pseudo" required>
      <input type="password" placeholder="Mot de passe" id="password" required>

      <div id="extraFields" class="hidden">

        <input type="email" placeholder="Email" id="signupEmail">
        <input type="text" placeholder="Nom" id="nom">
        <input type="text" placeholder="Prénom" id="prenom">

      </div>

      <button type="submit" class="main-btn">Valider</button>

      <p id="status" class="status" aria-live="polite"></p>

    </form>

    <p id="switchText">
      <span id="switchLabel">Pas de compte ?</span>
      <button id="switchModeBtn" type="button" class="link-btn">S'inscrire</button>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js?v=20260330-14"></script>

</body>
</html>
