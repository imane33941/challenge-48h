<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Math Fight 🦆 vs 🐰</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

  <!-- CANARD -->
  <div class="player left">
    <h2 id="playerNameLeft">🦆 Canard</h2>
    <div class="question" id="questionLeft"></div>
    <input type="text" id="displayLeft" readonly>
    <div class="calculator" id="calcLeft"></div>
  </div>

  <!-- CENTRE -->
  <div class="center">
    <h2>🦆 VS 🐰</h2>

    <div class="battle">
      <div class="fighter">
        <div class="character">🦆</div>
        <div class="life" id="lifeLeft">100 ❤️</div>
      </div>

      <div class="vs">⚔️</div>

      <div class="fighter">
        <div class="character">🐰</div>
        <div class="life" id="lifeRight">100 ❤️</div>
      </div>
    </div>

    <p>Bonne réponse = attaque 💥 | Mauvaise = tu prends un coup 😈</p>
  </div>

  <!-- LAPIN -->
  <div class="player right">
    <h2>🐰 Lapin</h2>
    <div class="question" id="questionRight"></div>
    <input type="text" id="displayRight" readonly>
    <div class="calculator" id="calcRight"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
